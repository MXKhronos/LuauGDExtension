name: LuauGDExtension Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scons
          
      - name: Cache Godot-CPP
        uses: actions/cache@v4
        with:
          # Cache the compiled godot-cpp static libraries
          path: |
            godot-cpp/bin/*.a
            godot-cpp/bin/*.lib
          # Use a key based on the godot-cpp submodule state
          key: ${{ runner.os }}-godot-cpp-${{ hashFiles('godot-cpp/SConstruct', 'godot-cpp/include/**') }}

      - name: SCons Build Cache
        uses: actions/cache@v4
        with:
          # SCons uses this file to track what needs recompiling
          path: .sconsign.db.sqlite
          key: ${{ runner.os }}-scons-db-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-scons-db-${{ github.ref_name }}-
            ${{ runner.os }}-scons-db-

      - name: Build Unit Tests
        run: scons target=editor bits=64 dev_build=yes tests=true

      - name: Install Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.5"
          use-dotnet: false

      - name: Execute Tests
        run: GODOT --headless --path ./demo -e -v --run-extension-tests --quit
