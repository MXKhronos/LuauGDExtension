name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      SCONS_CACHE: ${{ github.workspace }}/scons_cache
      SCONS_CACHE_LIMIT: 4096

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install SCons
        run: python -m pip install scons

      - name: SCons Build Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SCONS_CACHE }}
            .sconsign.db.sqlite
            godot-cpp/bin/*.a
            godot-cpp/bin/*.lib
          key: ${{ runner.os }}-scons-${{ hashFiles('**/SConstruct', 'godot-cpp/include/**') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-scons-${{ hashFiles('**/SConstruct', 'godot-cpp/include/**') }}-
            ${{ runner.os }}-scons-

      - name: Build Unit Tests
        run: scons target=editor dev_build=yes tests=true -j$(nproc)

      - name: Install Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.0"
          use-dotnet: false

      - name: Execute Tests
        run: godot --rendering-driver opengl3 --headless --path ./demo -e -v --run-extension-tests --quit

      - name: Generate report
        run: echo "Summary of results" > test-report.txt

      - name: Test Report Upload
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: test-report.txt

      - name: LuauGDExt Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luau GDExtension
          path: ./demo/bin/LuauGDExt/